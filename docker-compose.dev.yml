services:
  lyratech-mysql-dev:
    image: mysql:8.0
    container_name: lyratech-mysql-dev
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${DATABASE_PORT:-3308}:${DATABASE_PORT:-3308}"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_TCP_PORT: ${DATABASE_PORT:-3308}
    volumes:
      - lyratech_dev_db_data:/var/lib/mysql
    networks:
      - frontend

  lyratech-mysql-dev-backup:
    image: fradelg/mysql-cron-backup
    container_name: lyratech-mysql-dev-backup
    restart: unless-stopped
    depends_on:
      - lyratech-mysql-dev
    environment:
      MYSQL_HOST: lyratech-mysql-dev
      MYSQL_PORT: ${DATABASE_PORT:-3308}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASS: ${DATABASE_PASSWORD}
      MYSQL_DB: ${DATABASE_NAME}
      MAX_BACKUPS: ${BACKUP_MAX_BACKUPS:-4}
      CRON_TIME: ${BACKUP_CRON_TIME:-0 3 * * *}
      GZIP_LEVEL: ${BACKUP_GZIP_LEVEL:-6}
    volumes:
      - lyratech_dev_db_backups:/backup
    networks:
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lyratech-web-dev
    restart: always
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - frontend

networks:
  frontend:
    driver: bridge

volumes:
  lyratech_dev_db_data:
  lyratech_dev_db_backups: