services:
  lyratech-mysql-dev:
    image: mysql:8.0
    container_name: lyratech-mysql-dev
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${DATABASE_PORT:-3308}:${DATABASE_PORT:-3308}"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_TCP_PORT: ${DATABASE_PORT:-3308}
    volumes:
      - lyratech_dev_db_data:/var/lib/mysql
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - frontend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lyratech-backend-dev
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_HOST: lyratech-mysql-dev
      DATABASE_PORT: ${DATABASE_PORT:-3308}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-lyratech-super-secret-jwt-key-change-in-prod}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 480
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://localhost:3002","http://localhost:3001"]'
    depends_on:
      - lyratech-mysql-dev
    networks:
      - frontend

  lyratech-mysql-dev-backup:
    image: fradelg/mysql-cron-backup
    container_name: lyratech-mysql-dev-backup
    restart: unless-stopped
    depends_on:
      - lyratech-mysql-dev
    environment:
      MYSQL_HOST: lyratech-mysql-dev
      MYSQL_PORT: ${DATABASE_PORT:-3308}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASS: ${DATABASE_PASSWORD}
      MYSQL_DB: ${DATABASE_NAME}
      MAX_BACKUPS: ${BACKUP_MAX_BACKUPS:-4}
      CRON_TIME: ${BACKUP_CRON_TIME:-0 3 * * *}
      GZIP_LEVEL: ${BACKUP_GZIP_LEVEL:-6}
    volumes:
      - lyratech_dev_db_backups:/backup
    networks:
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lyratech-frontend-dev
    restart: always
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - frontend

networks:
  frontend:
    driver: bridge

volumes:
  lyratech_dev_db_data:
  lyratech_dev_db_backups: